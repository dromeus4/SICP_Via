name: Construir SICP Via (multiplataforma)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            ext: .zip
          - os: ubuntu-latest
            platform: linux
            ext: .zip
          - os: macos-latest
            platform: macos-arm64
            ext: .zip
          - os: macos-13
            platform: macos-x64
            ext: .zip

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17 (Adoptium)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Dar permisos a mvnw (Unix)
        if: runner.os != 'Windows'
        run: chmod +x mvnw

      - name: Construir imagen jlink (Windows)
        if: runner.os == 'Windows'
        run: .\mvnw.cmd javafx:jlink

      - name: Construir imagen jlink (Unix)
        if: runner.os != 'Windows'
        run: ./mvnw javafx:jlink

      - name: Renombrar zip con plataforma
        shell: bash
        run: |
          mv target/sicpvia.zip target/sicpvia-${{ matrix.platform }}.zip

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: sicpvia-${{ matrix.platform }}
          path: target/sicpvia-${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Descargar todos los artefactos
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
          generate_release_notes: true

